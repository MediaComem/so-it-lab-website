title: "6 ans de durabilité IT aux Hôpitaux universitaires de Genève (HUG) : un retour d’expérience"
location: Yverdon-les-Bains
institution: HEIG-VD
date: 23 avril 2026 17h à 19h
speakers: 
- Christine Morisseau
description: "Ingénieure spécialisée en système d’information, Christine Morisseau évolue depuis plus de 25 ans maintenant dans le domaine de l'IT aux Hôpitaux universitaires de Genève. En 2020, elle y prend la responsabilité du pôle RSE Informatique après avoir complété sa formation par un CAS en développement durable à l'université de Genève. Christine Morisseau a notamment joué un rôle clé dans l’obtention en 2023 du label \"numérique responsable\" de niveau 2 pour les HUG, une première en Suisse. Elle est par ailleurs membre du comité de l'Institute for Sustainable IT Suisse (ISIT-CH), et a assuré récemment aux HUG (juillet 2025 - février 2026) la responsabilité <i>ad interim</i> de la Direction de la tranformation numérique et de l'intelligence augmentée (DTN-IA).<br/><br/>Cet évènement est organisé en collaboration avec la filière Ingénierie des médias de la HEIG-VD.<br/><br/> <strong>Inscription obligatoire (présentiel et à distance)</strong> <a href=\"https://framaforms.org/so-it-lab-rencontre-du-23-avril-2026-1773068411\" target=\"_blank\">Formulaire d'inscription</a>."
