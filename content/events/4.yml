title: "Pris dans la toile : de l'utopie d'Internet au capitalisme numérique"
location: Lausanne
institution: UNIL
date: 18 juin 2026 17h à 19h
speakers:
- Sébastien Broca
description: "Les recherches de Sébastien Broca, à l’intersection de la sociologie, des sciences de l’information et de la communication et de l’économie politique, portent sur la critique des Big Tech ainsi que sur le coût social et écologique du numérique. Il a publié <a target=\"_blank\" href=\"https://www.payot.ch/Detail/9782369350972\"><i>Utopie du logiciel libre</i></a> (Le passager clandestin, 2013) et tout récemment <a target=\"_blank\" href=\"https://www.seuil.com/ouvrage/pris-dans-la-toile-sebastien-broca/9782021572971\"><i>Pris dans la toile : de l'utopie d'Internet au capitalisme numérique</i></a> (Seuil, 2025). Sébastien Broca est professeur à l'Université Paris 8 où il co-dirige le Centre d'études sur les médias, les technologies et l'internationalisation (CEMTI). Il co-coordonne également le groupe de travail <a target=\"_blank\" href=\"https://cis.cnrs.fr/politiques-des-communs-numeriques/\">\"Politiques des communs numériques\"</a> au sein du CNRS et a co-fondé la revue en ligne <a target=\"_blank\" href=\"https://www.encommuns.net/\"><i>EnCommuns</i></a>."
