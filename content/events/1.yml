title: "Sobriété et souveraineté : la stratégie de la ville de Lyon en matière de numérique"
location: Genève
institution: HEPIA
date: 31 mars 2026 17h à 19h
speakers:
  - Jean-Marie Séguret
description: "Après une formation initiale en méthodes informatiques appliquées à la gestion des entreprises à l'université Paris Sud, Jean-Marie Séguret a été directeur des systèmes d'information dans plusieurs collectivités territoriales françaises importantes avant d'être nommé en mai 2022 à ces mêmes fonctions à la ville de Lyon où il est chargé de mettre en oeuvre <a target=\"_blank\" href=\"https://www.cio-online.com/actualites/lire-jean-marie-seguret-dsi-de-lyon--se-soustraire-de-microsoft-impose-un-travail-de-fond-16527.html\">double stratégie de sobriété et de souveraineté numériques</a> de l'exécutif municipal (usage étendu de matériels reconditionnés, lutte contre l'obsolescence logicielle, distanciation de l'écosystème Microsoft et déploiement conséquent de solutions libres et open source) qui fait de la ville une des premières organisation publique à mener ce type de changement. Jean-Marie Séguret siège par ailleurs au conseil d'administration de COTER Numérique, l'association regroupant les professionnel·le·s des collectivités publiques françaises travaillant dans les domaines de l'informatique et de la communication, et l'un des ses chevaux de bataille ces dernières années est notamment de tenter de fédérer ces dernières face aux situations monopolistiques de certains fournisseurs.<br/><br/> <strong>Inscription obligatoire (présentiel et à distance)</strong> <a href=\"https://framaforms.org/so-it-lab-rencontre-du-31-mars-2026-1773061561\" target=\"_blank\">Formulaire d'inscription</a>."
