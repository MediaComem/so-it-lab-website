title: Plaidoyer pour une politique publique en faveur des communs numériques
location: Neuchâtel
institution: HE-Arc
date: 28 mai 2026 17h à 19h
speakers:
- Grégoire Barbey
description: Journaliste au quotidien <i>Le Temps</i> où il est l'un des principaux contributeur de la rubrique <a target="_blank" href="https://www.letemps.ch/cyber">Cyber</a> et pour lequel il produit également le podcast <a target="_blank" href="https://www.letemps.ch/podcasts/ia-qu-a-m-expliquer/"><i>IA qu'à m'expliquer</i></a>, Grégoire Barbey s'intéresse en particulier à la manière dont les évolutions technologiques structurent nos organisations sociales et politiques. Il a co-écrit <a target="_blank" href="https://www.slatkine.com/fr/editions-slatkine/74977-book-07211052-9782832110522.html"><i>Notre si précieuse intégrité numérique</i></a> (Slatkine, 2021) qui se positionne pour l’extension de nos droits fondamentaux à la dimension numérique de notre existence. Il a aussi dirigé l’enquête <a target="_blank" href="https://shop.heidi.news/product/razzia-sur-nos-data"><i>Razzia sur nos data</i></a> (Heidi.news, 2024), financée par des lecteur/trice-s et dons privés, qui a permis de documenter les pratiques de certaines entreprises suisses en matière de collecte et d’exploitation des données personnelles.<br/><br/>Cet évènement est organisé en collaboration avec les filières Informatique & systèmes de communication et Informatique de gestion de la HE-Arc.<br/><br/> <strong>Inscription obligatoire (présentiel et à distance)</strong> <a href="https://framaforms.org/so-it-lab-rencontre-du-28-mai-2026-1773148466" target="_blank">Formulaire d'inscription</a>.